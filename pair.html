<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pair Code</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
}

/* 🌈 BACKGROUND GLOW */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, red, transparent 50%),
    radial-gradient(circle at 80% 70%, cyan, transparent 50%),
    radial-gradient(circle at 50% 50%, purple, transparent 60%);
  filter:blur(100px);
  opacity:.8;
  animation:move 10s infinite alternate;
}
@keyframes move{
  0%{transform:translate(0,0)}
  100%{transform:translate(80px,-40px)}
}

/* ✨ FLOATING PARTICLES */
.particles span{
  position:absolute;
  width:6px;height:6px;
  background:white;
  border-radius:50%;
  animation:float 10s linear infinite;
}
@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

/* 📱 STATUS BAR */
.status{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:5px 10px;
  color:white;
  font-size:14px;
  z-index:10;
}

/* 💬 HEADER */
.header{
  margin-top:30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  color:orange;
}
.battery{
  background:#0f0;
  padding:5px 12px;
  border-radius:20px;
  color:black;
}

/* 🔥 CARD */
.container{
  position:relative;
  z-index:2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:80vh;
}

.box{
  width:300px;
  padding:20px;
  text-align:center;
  border-radius:15px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(15px);
  box-shadow:
    0 0 20px white,
    0 0 40px purple,
    0 0 60px cyan;
}

/* TITLE */
h3{
  font-size:28px;
  background:linear-gradient(90deg,orange,yellow,lime);
  -webkit-background-clip:text;
  color:transparent;
}

/* INPUT */
.input-container{
  display:flex;
  margin-top:10px;
}
.input-container input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px 0 0 10px;
}
.input-container button{
  padding:10px;
  border:none;
  border-radius:0 10px 10px 0;
  background:linear-gradient(90deg,orange,green);
  color:white;
  box-shadow:0 0 20px lime;
}

/* 🔥 CODE */
#copy{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  border-radius:10px;
  background:rgba(255,255,255,.1);
  box-shadow:0 0 20px red;
}

/* 🎵 MUSIC BUTTON */
.music-btn{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 20px;
  background:#111;
  color:white;
  border-radius:20px;
  box-shadow:0 0 20px cyan;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 📱 STATUS -->
<div class="status">
  <span id="time">12:00</span>
  <span>📶 LTE 🔋92%</span>
</div>

<!-- 💬 HEADER -->
<div class="header">
  <span>bugfixed sulexh tech</span>
  <span class="battery">100%</span>
</div>

<!-- ✨ PARTICLES -->
<div class="particles">
  <span style="left:10%"></span>
  <span style="left:30%"></span>
  <span style="left:50%"></span>
  <span style="left:70%"></span>
  <span style="left:90%"></span>
</div>

<!-- 🔥 MAIN -->
<div class="container">
  <div class="box">
    <i class="fa fa-user"></i>
    <h3>PAIRING CODE</h3>

    <p>Enter your number with country code</p>

    <div class="input-container">
      <input id="number" placeholder="e.g. 2547xxxxxx or 1974xxxxxxx">
      <button id="submit">GO</button>
    </div>

    <div id="pair"></div>
  </div>
</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop autoplay>
<source src="https://files.catbox.moe/s8tp1b.mp3">
</audio>

<div class="music-btn" id="musicBtn">⏸ Music</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
<script>
let output = document.getElementById("pair");
let btn = document.getElementById("submit");
let input = document.getElementById("number");
let loadingInterval;

/* ⏰ TIME */
setInterval(()=>{
  let d=new Date();
  document.getElementById("time").innerText =
  d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
},1000);

/* 🔄 LOADING ANIMATION */
function startLoading(){
  let dots = 0;
  loadingInterval = setInterval(()=>{
    dots = (dots + 1) % 4;
    output.innerHTML = "Generating code" + ".".repeat(dots);
  }, 500);
}

function stopLoading(){
  clearInterval(loadingInterval);
}

/* 📋 COPY */
async function copyCode(){
  let el = document.getElementById("copy");
  let text = el.innerText.replace("CODE: ","");
  await navigator.clipboard.writeText(text);
  el.innerText = "COPIED!";
  el.style.color = "lime";
  setTimeout(()=>{
    el.innerText = "CODE: " + text;
    el.style.color = "white";
  },1000);
}

/* 🔥 TYPE ANIMATION */
function typeCode(code){
  let i = 0;
  output.innerHTML = `<div id="copy" onclick="copyCode()">CODE: </div>`;
  let el = document.getElementById("copy");
  let typer = setInterval(()=>{
    el.innerText = "CODE: " + code.slice(0, i++);
    if(i > code.length) clearInterval(typer);
  },50);
}

/* 🚀 SUBMIT */
btn.onclick = async () => {
  let num = input.value.trim();
  if(!num){
    output.innerHTML = "⚠ Enter number";
    return;
  }

  // Remove all non-digits
  num = num.replace(/\D/g,"");

  // ✅ General numbers: no country code restrictions

  btn.disabled = true;
  startLoading();

  try{
    let res = await axios(`/pair/code?number=${num}`);

    stopLoading();
    btn.disabled = false;

    let code = res.data.code;

    if(!code || code.includes("Try") || code.includes("Error")){
      output.innerHTML = `
        ❌ Failed<br><br>
        <button onclick="retry()">🔄 Retry</button>
      `;
      return;
    }

    typeCode(code);

  }catch(err){
    stopLoading();
    btn.disabled = false;
    output.innerHTML = `
      ❌ Server Error<br><br>
      <button onclick="retry()">🔄 Retry</button>
    `;
  }
};

/* 🔁 RETRY */
function retry(){
  btn.click();
}

/* 🎵 MUSIC */
let music=document.getElementById("bgMusic");
let musicBtn=document.getElementById("musicBtn");
window.onload=()=>{
  music.volume=0.4;
  music.play().catch(()=>{
    document.body.onclick=()=>music.play();
  });
};
musicBtn.onclick=()=>{
  if(music.paused){
    music.play();
    musicBtn.innerText="⏸ Music";
  }else{
    music.pause();
    musicBtn.innerText="▶ Music";
  }
};
</script>

</body>
    </html>
